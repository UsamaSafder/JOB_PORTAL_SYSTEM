<div class="profile-container">
      <div class="page-header">
        <h2>My Profile</h2>
        <p>Manage your personal information and career details</p>
      </div>

      <div *ngIf="loading" class="loading">Loading...</div>

      <form *ngIf="!loading" (ngSubmit)="saveProfile()" class="profile-form">
        <!-- Profile Image Section -->
        <div class="profile-image-section">
          <div class="avatar-large">{{ candidate.firstName.charAt(0) }}</div>
          <button type="button" class="btn-upload-image">Change Photo</button>
        </div>

        <!-- Personal Information -->
        <div class="form-section">
          <h3>Personal Information</h3>
          <div class="form-row">
            <div class="form-group">
              <label>First Name *</label>
              <input type="text" [(ngModel)]="candidate.firstName" name="firstName" required>
            </div>
            <div class="form-group">
              <label>Last Name *</label>
              <input type="text" [(ngModel)]="candidate.lastName" name="lastName" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Email *</label>
              <input type="email" [(ngModel)]="candidate.email" name="email" required>
            </div>
            <div class="form-group">
              <label>Phone *</label>
              <input type="tel" [(ngModel)]="candidate.phone" name="phone" required>
            </div>
          </div>

          <div class="form-group">
            <label>Location *</label>
            <input type="text" [(ngModel)]="candidate.location" name="location" required>
          </div>
        </div>

        <!-- Professional Information -->
        <div class="form-section">
          <h3>Professional Information</h3>
          <div class="form-row">
            <div class="form-group">
              <label>Education *</label>
              <input type="text" [(ngModel)]="candidate.education" name="education" required>
            </div>
            <div class="form-group">
              <label>Experience *</label>
              <input type="text" [(ngModel)]="candidate.experience" name="experience" required>
            </div>
          </div>

          <div class="form-group">
            <label>Bio</label>
            <textarea [(ngModel)]="candidate.bio" name="bio" rows="4"></textarea>
          </div>

          <div class="form-group">
            <label>Skills (comma separated)</label>
            <input type="text" [value]="candidate.skills.join(', ')" (input)="updateSkills($event)" name="skills">
          </div>
        </div>

        <!-- Links -->
        <div class="form-section">
          <h3>Links</h3>
          <div class="form-group">
            <label>LinkedIn URL</label>
            <input type="url" [(ngModel)]="candidate.linkedinUrl" name="linkedinUrl">
          </div>
          <div class="form-group">
            <label>Portfolio URL</label>
            <input type="url" [(ngModel)]="candidate.portfolioUrl" name="portfolioUrl">
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save" [disabled]="saving">
            {{ saving ? 'Saving...' : 'Save Changes' }}
          </button>
          <button type="button" class="btn-cancel" (click)="cancelEdit()">Cancel</button>
        </div>
      </form>
    </div>
