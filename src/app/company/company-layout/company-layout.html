<!-- src/app/company/company-layout/company-layout.component.html -->

<div class="layout-container">
  <!-- Sidebar -->
  <aside class="sidebar" [class.closed]="!isSidebarOpen">
    <div class="sidebar-header">
      <h2>{{ currentCompany?.companyName || 'Company Portal' }}</h2>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <span *ngIf="isSidebarOpen">✕</span>
        <span *ngIf="!isSidebarOpen">☰</span>
      </button>
    </div>

    <nav class="sidebar-nav" *ngIf="isSidebarOpen">
      <a routerLink="/company/dashboard" routerLinkActive="active" class="nav-item">
        <span class="icon">📊</span>
        <span>Dashboard</span>
      </a>
      <a routerLink="/company/post-job" routerLinkActive="active" class="nav-item">
        <span class="icon">➕</span>
        <span>Post New Job</span>
      </a>
      <a routerLink="/company/manage-jobs" routerLinkActive="active" class="nav-item">
        <span class="icon">📋</span>
        <span>Manage Jobs</span>
      </a>
      <a routerLink="/company/applications" routerLinkActive="active" class="nav-item">
        <span class="icon">📄</span>
        <span>View Applications</span>
      </a>
      <a routerLink="/company/profile" routerLinkActive="active" class="nav-item">
        <span class="icon">🏢</span>
        <span>Company Profile</span>
      </a>
    </nav>

    <div class="sidebar-footer" *ngIf="isSidebarOpen">
      <button class="logout-btn" (click)="logout()">
        <span class="icon">🚪</span>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="top-header">
      <button class="menu-toggle" (click)="toggleSidebar()" *ngIf="!isSidebarOpen">
        ☰
      </button>
      <div class="user-info">
        <span>Welcome, {{ currentCompany?.companyName }}</span>
        <span class="verification-badge" *ngIf="currentCompany?.isVerified">
          ✓ Verified
        </span>
      </div>
    </header>

    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
